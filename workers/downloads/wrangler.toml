name = "pulseos-downloads"
main = "index.js"
compatibility_date = "2024-09-23"

# After deploying, add these secrets via:
#   wrangler secret put ISSUER_ID
#   wrangler secret put KEY_ID
#   wrangler secret put PRIVATE_KEY
#   wrangler secret put VENDOR_NUMBER

# Create KV namespace first: wrangler kv namespace create DOWNLOADS_KV
# Then replace YOUR_KV_NAMESPACE_ID below with the returned id.
[[kv_namespaces]]
binding = "DOWNLOADS_KV"
id = "YOUR_KV_NAMESPACE_ID"

# Optional: bind to pulseos.eu subdomain
# [env.production.routes]
# pattern = "downloads.pulseos.eu/*"
# zone_name = "pulseos.eu"
